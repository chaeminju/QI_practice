services:
  - type: web
    name: cfa
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: VITE_API_BASE
        value: ""
      - key: DATABASE_URL
        sync: false
